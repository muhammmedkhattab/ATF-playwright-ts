name: Cleanup Branch

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  delete-branch:
    name: Delete merged branch
    runs-on: ubuntu-latest
    # Only delete when the PR was actually merged, not just closed
    if: github.event.pull_request.merged == true

    steps:
      - name: Delete branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;

            // Never delete the default branch or release branches
            const protected_patterns = [/^main$/, /^master$/, /^release\/.+/, /^hotfix\/.+/];
            if (protected_patterns.some(p => p.test(branch))) {
              core.info(`Skipping protected branch: ${branch}`);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              core.info(`Deleted branch: ${branch}`);
            } catch (err) {
              core.warning(`Could not delete branch ${branch}: ${err.message}`);
            }
